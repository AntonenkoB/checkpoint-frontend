<div class="login">
  <div class="logo-wrap" [class.focus]="nameFocus()" >
    <img class="logo" src="../../assets/logo.png" alt=""/>
  </div>
  <div class="name-wrap">
    <input
      class="name"
      type="text"
      [class.small]="nameForm.name().value().length > 18"
      [class.middle]="nameForm.name().value().length > 10"
      [field]="nameForm.name"
      (focusin)="nameFocus.set(true)"
      (focusout)="nameFocus.set(false)"
    />

    @if (nameForm.name().value().length > 2) {
      <ion-button class="send" fill="clear">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40" fill="none">
          <path d="M16.8559 26.7486V11L23.5257 16.734" stroke="#fff" stroke-width="2.25" stroke-miterlimit="10"/>
          <path d="M18.3834 26.7486C18.3834 27.6016 17.8647 28.4427 16.8844 29.0962C15.908 29.7471 14.5267 30.168 12.9729 30.168C11.4191 30.168 10.0378 29.7471 9.06145 29.0962C8.08113 28.4427 7.5625 27.6016 7.5625 26.7486C7.5625 25.8956 8.08113 25.0545 9.06145 24.4009C10.0378 23.75 11.4191 23.3291 12.9729 23.3291C14.5267 23.3291 15.908 23.75 16.8844 24.4009C17.8647 25.0545 18.3834 25.8956 18.3834 26.7486Z" fill="#fff" stroke="#fff" stroke-width="1.125"/>
          <path d="M27.9943 20.5782V11L32.0508 14.4874" stroke="#fff" stroke-width="2.25" stroke-miterlimit="10"/>
          <path d="M28.7029 20.5782C28.7029 21.0004 28.4462 21.4514 27.8894 21.8226C27.3365 22.1912 26.5403 22.4375 25.6327 22.4375C24.7251 22.4375 23.9289 22.1912 23.376 21.8226C22.8192 21.4514 22.5625 21.0004 22.5625 20.5782C22.5625 20.156 22.8192 19.705 23.376 19.3338C23.9289 18.9652 24.7251 18.7189 25.6327 18.7189C26.5403 18.7189 27.3365 18.9652 27.8894 19.3338C28.4462 19.705 28.7029 20.156 28.7029 20.5782Z" fill="#fff" stroke="#fff" stroke-width="1.125"/>
        </svg>
      </ion-button>
    }
  </div>
</div>
